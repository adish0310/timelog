// Use Anthropic API as a server-side proxy to avoid CORS
async function mondayViaAnthropic(query) {
  try {
    var prompt = "Call the Monday.com GraphQL API with this exact query and return ONLY the raw JSON response, nothing else:\n\nURL: https://api.monday.com/v2\nMethod: POST\nHeaders: Authorization: " + MONDAY_TOKEN + ", Content-Type: application/json, API-Version: 2024-01\nBody: " + JSON.stringify({ query: query });

    var res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{
          type: "web_search_20250305",
          name: "web_search"
        }],
        messages: [{ role: "user", content: prompt }]
      })
    });
    var data = await res.json();
    // Extract text from response
    var text = "";
    if (data.content) {
      data.content.forEach(function(b) { if (b.type === "text") text += b.text; });
    }
    // Try to parse JSON from response
    var match = text.match(/\{[\s\S]*\}/);
    if (match) return JSON.parse(match[0]);
    return null;
  } catch(e) { console.error("Anthropic proxy error:", e); return null; }
}

// Queue for offline sync
var syncQueue = [];
function loadQueue() { try { return JSON.parse(localStorage.getItem("timelog_sync_queue")||"[]"); } catch(e) { return []; } }
function saveQueue(q) { localStorage.setItem("timelog_sync_queue", JSON.stringify(q)); }

async function syncToMonday(emp, date, entry) {
  var itemName = emp.name + " — " + date;
  var colVals = buildMondayColumns(emp, entry, date);

  // Build GraphQL - try create, on conflict update
  var createQ = 'mutation { create_item(board_id:' + MONDAY_BOARD +
    ', item_name:"' + itemName + '"' +
    ', column_values:"' + colVals + '"' +
    ') { id } }';

  var result = await mondayViaAnthropic(createQ);
  return !!(result && result.data);
}

async function deleteFromMonday(emp, date) {
  // Find and delete item
  var itemName = emp.name + " — " + date;
  var findQ = '{ boards(ids:' + MONDAY_BOARD + ') { items_page(limit:50, query_params:{rules:[{column_id:"name",compare_value:["' + itemName + '"]}]}) { items { id } } } }';
  var found = await mondayViaAnthropic(findQ);
  if (found && found.data && found.data.boards[0].items_page.items.length > 0) {
    var id = found.data.boards[0].items_page.items[0].id;
    await mondayViaAnthropic('mutation { delete_item(item_id:' + id + ') { id } }');
  }
}

function buildMondayColumns(emp, entry, date) {
  var cols = {};
  cols["date4"] = { date: date };
  if (entry.type === "hourly") {
    cols["status"] = { label: "Hourly" };
    cols["numbers"]  = entry.hours || 0;
    cols["numbers0"] = parseFloat(emp.rate) || 0;
    cols["numbers1"] = Math.round((entry.hours||0) * (parseFloat(emp.rate)||0));
    cols["text8"]    = entry.note || "";
  } else if (entry.type === "project") {
    cols["status"]   = { label: "Project" };
    cols["numbers1"] = entry.projectAmt || 0;
    cols["text8"]    = entry.note || "";
  } else if (entry.type === "sales") {
    cols["status"]   = { label: "Sales" };
    cols["numbers2"] = entry.saleAmt || 0;
    cols["numbers3"] = entry.commission || 0;
    cols["numbers1"] = entry.earned || 0;
    cols["text8"]    = entry.note || "";
  }
  return JSON.stringify(cols).replace(/"/g, '\\"');
}

async function testMondayConnection() {
  var r = await mondayViaAnthropic("{ me { name } }");
  return !!(r && r.data && r.data.me);
}

// ── Neo shadow — key to authentic look ───────────────────────────
// Raised: light top-left, dark bottom-right
function nR(col, i) {
  i = i || 1;
  col = col || "transparent";
  var g = Math.round(18*i);
  var a = Math.round(35*i).toString(16).padStart(2,"0");
  return "6px 6px 14px "+SHD+", -5px -5px 12px "+SHL+(col!=="transparent"?", 0 0 "+g+"px "+col+a:"");
}
// Inset: pressed into surface
function nI(col) {
  col = col || "transparent";
  var extra = col!=="transparent" ? ", inset 0 0 14px "+col+"25" : "";
  return "inset 5px 5px 12px "+SHD+", inset -4px -4px 10px "+SHL+extra;
}
// Pure glow
function nG(col, sz) { sz=sz||16; return "0 0 "+sz+"px "+col+"55, 0 0 "+(sz*2)+"px "+col+"18"; }

function empGrad(e){ return e.grad||GR.blue; }

// helpers
var getTodayStr=function(){return new Date().toISOString().split("T")[0];};
var formatDate=function(ds){return new Date(ds+"T12:00:00").toLocaleDateString("he-IL",{weekday:"short",month:"short",day:"numeric"});};
var formatDateShort=function(ds){return new Date(ds+"T12:00:00").toLocaleDateString("he-IL",{month:"short",day:"numeric"});};
function getDaysInRange(n){var a=[];n=n||14;for(var i=n-1;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);a.push(d.toISOString().split("T")[0]);}return a;}
function loadLocal(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}

  var inset  = "background:"+S2+";box-shadow:"+nI()+";border:none;border-radius:14px;";

  return [
    "@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap');",
    "*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}",
    "html,body{background:"+BG+";font-family:'Inter',sans-serif;}",
    "input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}",
    "input[type=date]{color-scheme:dark;}",
    "input::placeholder,textarea::placeholder{color:"+C.textDim+";}",

    "@keyframes si{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}",
    "@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}",
    "@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.2)}}",
    "@keyframes flicker{0%,94%,96%,100%{opacity:1}95%{opacity:.4}}",
    "@keyframes pressIn{to{box-shadow:"+nI()+"}}",

    ".tf{font-family:'Orbitron',monospace;letter-spacing:1.5px;}",
    ".slide{animation:si .3s cubic-bezier(.22,.68,0,1.1) both;}",

    // ── Surface: raised tile (like the squares in the reference) ──
    ".tile{"+raised+"}",

    // ── Surface: inset well (like the search bar / pressed circle) ──
    ".well{"+inset+";outline:none;color:"+C.text+";transition:box-shadow .2s,border-color .2s;width:100%;}",
    ".well:focus{box-shadow:"+nI(C.blue)+";outline:none;}",

    // ── Primary CTA button — raised, colored glow ──
    ".cta{"+raised+"cursor:pointer;color:#fff;font-weight:700;font-family:'Inter',sans-serif;",
      "transition:box-shadow .15s,transform .1s;}",
    ".cta:active{box-shadow:"+nI()+";transform:scale(.98);}",

    // ── Ghost button — same as tile but with press feedback ──
    ".ghost{"+raised+"cursor:pointer;font-family:'Inter',sans-serif;transition:box-shadow .15s,transform .1s;color:"+C.text+";}",
    ".ghost:active{box-shadow:"+nI()+";transform:scale(.97);}",

    // ── Tab pill ──
    ".pill{"+raised+"cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;transition:all .18s;color:"+C.textMid+";font-size:14px;}",
    ".pill.on{box-shadow:"+nI(C.blue)+";color:"+C.blue+";}",

    // ── Employee card ──
    ".ecard{"+raised+"cursor:pointer;display:block;width:100%;text-align:left;",
      "transition:box-shadow .15s,transform .12s;}",
    ".ecard:active{box-shadow:"+nI()+";transform:scale(.985);}",

    // ── Numpad key ──
    ".nkey{"+raised+"cursor:pointer;color:"+C.text+";font-weight:700;font-size:22px;",
      "padding:17px 0;transition:box-shadow .12s,transform .1s;font-family:'Inter',sans-serif;}",
    ".nkey:active{box-shadow:"+nI()+";transform:scale(.94);}",

    // ── Range pill ──
    ".rpill{"+raised+"cursor:pointer;font-weight:600;font-size:13px;",
      "padding:8px 18px;color:"+C.text+";transition:all .18s;font-family:'Inter',sans-serif;}",
    ".rpill.on{box-shadow:"+nI(C.amber)+";color:"+C.amber+";}",

    // ── Color swatch ──
    ".swatch{border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .18s;box-shadow:"+nR()+";}",
    ".swatch.sel{border-color:#fff;box-shadow:"+nR()+" !important;}",

    // ── Stat box ──
    ".sbox{border-radius:18px;padding:14px 6px;text-align:center;flex:1;"+raised+"}",

    // ── Sparkline container ──
    ".spark{"+inset+"padding:9px 11px;}",

    // ── History card ──
    ".hcard{"+raised+"padding:13px 18px;}",

    // ── Type toggle active states ──
    ".ttype{"+raised+"cursor:pointer;padding:11px 0;font-weight:700;font-size:13px;flex:1;",
      "transition:all .18s;font-family:'Inter',sans-serif;color:"+C.text+";}",
    ".ttype.hourly{box-shadow:"+nI(C.blue)+";color:"+C.blue+";}",
    ".ttype.project{box-shadow:"+nI(C.gold)+";color:"+C.gold+";}",

    // ── PIN dot cell ──
    ".pindot{background:"+S1+";border-radius:16px;display:flex;align-items:center;justify-content:center;",
      "transition:all .2s;}",
  ].join("\n");
}

function StyleInjector(){
  useEffect(function(){
    var el=document.createElement("style");el.textContent=buildCSS();
    document.head.appendChild(el);return function(){document.head.removeChild(el);};
  },[]);return null;
}

// ── Date picker row ───────────────────────────────────────────────
function DateRow(p){
  var today=getTodayStr(), last30=getDaysInRange(30);
  return(
    <div style={{marginBottom:20}}>
      <Label text="// Date"/>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        {["Today","Yesterday"].map(function(label,idx){
          var d=idx===0?today:last30[last30.length-2];
          var active=p.date===d;
          return(
            <button key={label} className={"pill"+(active?" on":"")}
              onClick={function(){p.setDate(d);}}
              style={{padding:"8px 16px",fontSize:12,fontWeight:600,color:active?C.blue:C.textMid,
                borderRadius:12}}>
              {label}
            </button>
          );
        })}

      <input type="date" className="well"
        value={p.date} max={today} min={last30[0]}
        onChange={function(e){if(e.target.value)p.setDate(e.target.value);}}
        style={{padding:"12px 16px",fontSize:15,borderRadius:14,fontFamily:"'Inter',sans-serif"}}/>
      {p.date!==today&&(
        <div style={{marginTop:10,padding:"9px 14px",borderRadius:12,
          background:S1,boxShadow:nR(C.amber,.6),
          display:"inline-flex",alignItems:"center",gap:6}}>
          <span style={{background:GR.amber,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",
            backgroundClip:"text",fontSize:13,fontWeight:600}}>
            {"Logging for: "+formatDate(p.date)}
          </span>
        </div>
      )}
    </div>
  );
}

// EMPLOYEE FORM
// ══════════════════════════════════════════════════════════════════
function EmployeeForm(p){
  var emp=p.emp,data=p.data,setData=p.setData,today=getTodayStr();
  var [selDate,setSelDate]=useState(today);
  var [type,setType]=useState("hourly");
  var [hours,setHours]=useState("");
  var [projAmt,setProjAmt]=useState("");
  var [note,setNote]=useState("");
  var [saved,setSaved]=useState(false);

  useEffect(function(){
    var e=data&&data[emp.id]&&data[emp.id][selDate];
    if(e){setType(e.type||"hourly");setHours(e.hours||"");setProjAmt(e.projectAmt||"");setNote(e.note||"");}
    else{setType("hourly");setHours("");setProjAmt("");setNote("");}
  },[selDate]);

  var existing=data&&data[emp.id]&&data[emp.id][selDate];

  function save(){
    var upd=Object.assign({},data);
    if(!upd[emp.id]) upd[emp.id]={};
    var entry;
    if(type==="hourly"){var h=parseFloat(hours);if(isNaN(h)||h<0||h>24)return;entry={type:"hourly",hours:h,note:note,ts:new Date().toISOString()};}
    else{var a=parseFloat(projAmt);if(isNaN(a)||a<0)return;entry={type:"project",projectAmt:a,note:note,ts:new Date().toISOString()};}
    upd[emp.id][selDate]=entry;
    setData(upd);saveLocal(STORAGE_KEY,upd);setSaved(true);
    setTimeout(function(){setSaved(false);},2500);
    syncToMonday(emp,selDate,entry);
  }

  var empRate = parseFloat(emp.rate)||0;
  var hn=parseFloat(hours);
  var earned=type==="hourly"&&empRate>0&&hours!==""&&!isNaN(hn)?(hn*empRate):null;

  // Monthly accumulation
  var now=new Date();
  var monthDays=(function(){
    var a=[],d=new Date(now.getFullYear(),now.getMonth(),1);
    while(d.getMonth()===now.getMonth()){a.push(d.toISOString().split("T")[0]);d.setDate(d.getDate()+1);}
    return a;
  })();
  var empData=(data&&data[emp.id])||{};
  var monthH=monthDays.reduce(function(s,d){var e=empData[d];return s+(e&&e.type!=="project"?(e.hours||0):0);},0);
  var monthP=monthDays.reduce(function(s,d){var e=empData[d];return s+(e&&e.type==="project"?(e.projectAmt||0):0);},0);
  var monthPay=Math.round(monthH*(empRate)+monthP);
  var MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  return(
    <div style={{padding:"24px 18px"}} className="slide">

      {/* Back button */}
      <button className="ghost" onClick={p.onBack}
        style={{padding:"9px 18px",marginBottom:18,fontSize:13,fontWeight:600,
          borderRadius:14,color:C.blue,display:"inline-flex",alignItems:"center",gap:6}}>
        ‹  Back
      </button>

      {/* ── Live earnings + monthly accumulation bar ── */}
      <div className="tile" style={{padding:"0",marginBottom:20,overflow:"hidden",
        boxShadow:nR(emp.color,.55)}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:3,
          borderRadius:"20px 20px 0 0",background:empGrad(emp)}}/>

        {/* Live: current entry — only if rate is set */}
        {empRate>0&&(
          <div style={{padding:"16px 18px 12px",borderBottom:"1px solid "+C.textDim+"18"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{color:C.textMid,fontSize:11,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>
                  {hours&&!isNaN(hn)&&hn>0?"This entry":"Rate"}
                </div>
                <div style={{color:C.textDim,fontSize:12}}>{"₪"+empRate+" × "+(hours&&!isNaN(hn)&&hn>0?hn+"h":"—")}</div>
              </div>
              <div className="tf" style={{
                background:earned?empGrad(emp):"none",
                WebkitBackgroundClip:earned?"text":"unset",
                WebkitTextFillColor:earned?"transparent":"unset",
                backgroundClip:earned?"text":"unset",
                color:earned?undefined:C.textDim,
                fontSize:earned?28:20,fontWeight:900,
                transition:"font-size .15s",
              }}>
                {earned?"₪"+Math.round(earned).toLocaleString("he-IL"):"₪—"}
              </div>
            </div>
          </div>
        )}

        {/* Monthly accumulation — clickable → opens popup */}
        <button onClick={function(){p.onOpenSummary&&p.onOpenSummary();}}
          style={{padding:"12px 18px 16px",display:"block",width:"100%",
            background:"transparent",border:"none",cursor:"pointer",textAlign:"right"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{color:C.textMid,fontSize:11,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>
                {MONTHS[now.getMonth()]+" total  ›"}
              </div>
              <div style={{color:C.textDim,fontSize:12}}>{monthH+"h worked this month"}</div>
            </div>
            <div className="tf" style={{
              background:empRate>0?GR.amber:empGrad(emp),
              WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",
              fontSize:24,fontWeight:900,
            }}>
              {empRate>0
                ?("₪"+(monthPay>0?monthPay.toLocaleString("he-IL"):"0"))
                :(monthH>0?monthH+"h":"—")}
            </div>
          </div>
          {monthH>0&&(
            <>
              <div style={{marginTop:10,background:S2,borderRadius:6,height:6,overflow:"hidden",
                boxShadow:nI()}}>
                <div style={{height:"100%",borderRadius:6,background:empGrad(emp),
                  width:Math.min(100,Math.round(monthH/160*100))+"%",
                  transition:"width .4s ease",boxShadow:nG(emp.color,4)}}/>
              </div>
              <div style={{color:C.textDim,fontSize:10,marginTop:5,textAlign:"right"}}>
                {Math.round(monthH/160*100)+"% of 160h  —  tap for details"}
              </div>
            </>
          )}
        </button>
      </div>

      {/* Profile tile */}
      <div className="tile" style={{padding:"16px 18px",marginBottom:20,
        boxShadow:nR(emp.color,.4),overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:3,
          borderRadius:"20px 20px 0 0",background:empGrad(emp)}}/>
        <div style={{display:"flex",alignItems:"center",gap:16,direction:"ltr"}}>
          <Avatar emp={emp} size={48}/>
          <div>
            <div className="tf" style={{background:empGrad(emp),WebkitBackgroundClip:"text",
              WebkitTextFillColor:"transparent",backgroundClip:"text",fontSize:16,fontWeight:700}}>
              {emp.name}
            </div>
            <div style={{color:C.textMid,fontSize:12,marginTop:2}}>{formatDate(today)}</div>
          </div>
        </div>
      </div>

      {/* Date */}
      <DateRow date={selDate} setDate={setSelDate}/>

      {/* Existing notice */}
      {existing&&(
        <div style={{background:S2,borderRadius:14,padding:"10px 16px",marginBottom:16,
          boxShadow:nI(C.green)}}>
          <span style={{background:GR.green,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",
            backgroundClip:"text",fontSize:13,fontWeight:600}}>
            {existing.type==="project"?"▸  Project entry — tap Save to update":"▸  "+existing.hours+"h logged — tap Save to update"}
          </span>
        </div>
      )}

      {/* Type toggle */}
      <Label text="// Log Type"/>
      <TypeToggle type={type} setType={setType}/>

      {/* Hourly */}
      {type==="hourly"&&(
        <>
          <Label text="// Hours Worked"/>
          <div style={{background:S2,borderRadius:20,padding:"20px 16px",marginBottom:earned?10:16,
            boxShadow:nI(emp.color),display:"flex",alignItems:"center",justifyContent:"center"}}>
            <input type="number" min="0" max="24" step="0.5" inputMode="decimal" pattern="[0-9]*"
              value={hours} onChange={function(e){setHours(e.target.value);}}
              placeholder="0.0"
              style={{background:"transparent",border:"none",outline:"none",
                fontSize:48,fontWeight:900,textAlign:"center",color:emp.color,
                width:"100%",letterSpacing:2,fontFamily:"'Orbitron',monospace"}}/>
          </div>
          {earned&&empRate>0&&(
            <div style={{textAlign:"center",marginBottom:16}}>
              <span style={{color:C.textDim,fontSize:12}}>= </span>
              <span className="tf" style={{background:empGrad(emp),WebkitBackgroundClip:"text",
                WebkitTextFillColor:"transparent",backgroundClip:"text",fontSize:20,fontWeight:800}}>
                {"₪"+Math.round(earned).toLocaleString("he-IL")}
              </span>
            </div>
          )}
        </>
      )}

      {/* Project */}
      {type==="project"&&(
        <>
          <Label text="// Project Amount (₪)"/>
          <div style={{background:S2,borderRadius:20,padding:"20px 16px",marginBottom:16,
            boxShadow:nI(C.gold),display:"flex",alignItems:"center",justifyContent:"center"}}>
            <input type="number" min="0" step="10" inputMode="decimal" pattern="[0-9]*"
              value={projAmt} onChange={function(e){setProjAmt(e.target.value);}}
              placeholder="0"
              style={{background:"transparent",border:"none",outline:"none",
                fontSize:48,fontWeight:900,textAlign:"center",color:C.gold,
                width:"100%",letterSpacing:2,fontFamily:"'Orbitron',monospace"}}/>
          </div>
          <div style={{background:S2,borderRadius:14,padding:"10px 16px",marginBottom:16,
            boxShadow:nI(C.gold)}}>
            <span style={{color:C.gold,fontSize:13,fontWeight:500}}>
              💡 Fixed project price — no hourly rate applied
            </span>
          </div>
        </>
      )}

      {/* Notes */}
      <Label text="// Notes"/>
      <textarea value={note} onChange={function(e){setNote(e.target.value);}}
        placeholder="Project details, overtime, etc..." rows={3}
        className="well"
        style={{padding:"14px 16px",fontSize:15,marginBottom:22,resize:"none",
          lineHeight:1.6,borderRadius:16}}/>

      {/* Save CTA — raised colored tile */}
      <div className="cta" onClick={save}
        style={{
          padding:"18px",fontSize:15,letterSpacing:2,textTransform:"uppercase",
          textAlign:"center",cursor:"pointer",borderRadius:20,
          background:saved?GR.green:empGrad(emp),
          boxShadow:saved?nR(C.green,1):nR(emp.color,1),
          color:"#fff",fontFamily:"'Orbitron',monospace",fontWeight:900,
        }}>
        {saved?"✓   Saved":"Save Entry"}
      </div>

      {/* History */}
      <div style={{marginTop:32}}>
        <Label text="// Last 14 Days"/>
        <div className="tile" style={{padding:"4px 8px"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:3,
            borderRadius:"20px 20px 0 0",background:empGrad(emp)}}/>
          {getDaysInRange(14).reverse().map(function(d,i,arr){
            var entry=data&&data[emp.id]&&data[emp.id][d];
            var isProj=entry&&entry.type==="project";
            var dayEarned=entry&&!isProj&&empRate>0?(entry.hours*empRate).toLocaleString("he-IL"):null;
            var isSelected=d===selDate;
            return(
              <div key={d} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                padding:"10px 10px",
                borderBottom:i<arr.length-1?"1px solid "+C.textDim+"15":"none",
                background:isSelected?S2:"transparent",
                borderRadius:isSelected?"12px":"0",
                boxShadow:isSelected?nI(emp.color):"none",
                margin:isSelected?"2px 0":"0"}}>
                <div style={{flex:1}}>
                  <span style={{color:d===today?C.blue:C.textMid,fontSize:13,
                    fontWeight:d===today?700:500}}>
                    {d===today?"Today  ":""}{formatDateShort(d)}
                  </span>
                  {entry&&entry.note&&<div style={{color:C.textDim,fontSize:11,marginTop:2}}>{entry.note}</div>}
                  {dayEarned&&<div style={{background:GR.green,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",fontSize:11,fontWeight:600,marginTop:2}}>{"₪"+dayEarned}</div>}
                  {isProj&&<div style={{background:GR.gold,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",fontSize:11,fontWeight:600,marginTop:2}}>{"₪"+entry.projectAmt.toLocaleString("he-IL")}</div>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {entry&&<DeleteBtn
                    entry={entry}
                    onDeleteAll={function(){
                      var upd=Object.assign({},data);
                      upd[emp.id]=Object.assign({},upd[emp.id]);
                      delete upd[emp.id][d];
                      setData(upd);saveLocal(STORAGE_KEY,upd);deleteFromMonday(emp,d);
                    }}
                    onDeleteHours={function(remaining){
                      var upd=Object.assign({},data);
                      upd[emp.id]=Object.assign({},upd[emp.id]);
                      upd[emp.id][d]=Object.assign({},upd[emp.id][d],{hours:remaining});
                      setData(upd);saveLocal(STORAGE_KEY,upd);
                    }}
                  />}
                  {isProj?<ProjectBadge/>:<HourBadge hours={entry?entry.hours:0}/>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Delete button with popup modal ───────────────────────────────
function DeleteBtn(p){
  // p.entry = the entry object, p.onDeleteAll, p.onDeleteHours(newHours)
  var [open,setOpen]=useState(false);
  var [mode,setMode]=useState(null);      // null | "hours"
  var [newHours,setNewHours]=useState(""); // for partial delete

  var entry=p.entry;
  var isProject=entry&&entry.type==="project";
  var currentHours=entry&&!isProject?entry.hours:0;

  function close(){setOpen(false);setMode(null);setNewHours("");}

  function handleDeleteAll(){p.onDeleteAll();close();}

  function handleDeleteHours(){
    var h=parseFloat(newHours);
    if(isNaN(h)||h<=0||h>currentHours) return;
    var remaining=Math.round((currentHours-h)*100)/100;
    if(remaining<=0) p.onDeleteAll();
    else p.onDeleteHours(remaining);
    close();
  }

  return(
    <>
      {/* Trigger button */}
      <button className="ghost" onClick={function(){setOpen(true);}}
        style={{width:30,height:30,borderRadius:"50%",padding:0,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:14,color:C.textDim,flexShrink:0}}>
        ✕
      </button>

      {/* Modal overlay */}
      {open&&(
        <div onClick={close} style={{
          position:"fixed",inset:0,zIndex:100,
          background:"rgba(0,0,0,0.65)",
          display:"flex",alignItems:"flex-end",justifyContent:"center",
          backdropFilter:"blur(4px)"}}>
          <div onClick={function(e){e.stopPropagation();}}
            style={{
              width:"100%",maxWidth:430,
              background:S1,borderRadius:"24px 24px 0 0",
              padding:"24px 20px 36px",
              boxShadow:"0 -8px 40px rgba(0,0,0,.6), 0 -1px 0 "+SHL,
              animation:"slideUp .25s cubic-bezier(.22,.68,0,1.1)"}}>

            {/* Handle bar */}
            <div style={{width:36,height:4,borderRadius:2,background:C.textDim+"50",
              margin:"0 auto 20px"}}/>

            {mode===null&&(
              <>
                <div style={{color:C.text,fontSize:16,fontWeight:700,marginBottom:4}}>
                  Remove Entry
                </div>
                <div style={{color:C.textMid,fontSize:13,marginBottom:22}}>
                  {isProject
                    ?"Delete this project entry?"
                    :"Currently logged: "+currentHours+"h — what would you like to do?"}
                </div>

                {/* Option 1: Remove specific hours — only for hourly */}
                {!isProject&&(
                  <button className="ghost" onClick={function(){setMode("hours");}}
                    style={{width:"100%",padding:"15px 18px",borderRadius:18,marginBottom:12,
                      display:"flex",alignItems:"center",gap:14,textAlign:"left",
                      boxShadow:nR(C.blue,.5)}}>
                    <div style={{width:38,height:38,borderRadius:"50%",flexShrink:0,
                      background:"linear-gradient(135deg,"+C.blue+"33,"+C.blueD+"22)",
                      display:"flex",alignItems:"center",justifyContent:"center",
                      boxShadow:nR(C.blue,.6),fontSize:18}}>⏱</div>
                    <div>
                      <div style={{color:C.text,fontWeight:600,fontSize:14}}>Remove specific hours</div>
                      <div style={{color:C.textMid,fontSize:12,marginTop:2}}>Subtract hours from today's total</div>
                    </div>
                  </button>
                )}

                {/* Option 2: Delete all */}
                <button className="ghost" onClick={handleDeleteAll}
                  style={{width:"100%",padding:"15px 18px",borderRadius:18,marginBottom:16,
                    display:"flex",alignItems:"center",gap:14,textAlign:"left",
                    boxShadow:nR("#f87171",.5)}}>
                  <div style={{width:38,height:38,borderRadius:"50%",flexShrink:0,
                    background:"linear-gradient(135deg,#f87171,#dc2626)",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:18}}>🗑</div>
                  <div>
                    <div style={{background:GR.red,WebkitBackgroundClip:"text",
                      WebkitTextFillColor:"transparent",backgroundClip:"text",
                      fontWeight:700,fontSize:14}}>Delete entire entry</div>
                    <div style={{color:C.textMid,fontSize:12,marginTop:2}}>
                      {isProject?"Remove the project entry":"Remove all "+currentHours+"h from this day"}
                    </div>
                  </div>
                </button>

                <button onClick={close}
                  style={{width:"100%",padding:"12px",borderRadius:14,border:"none",
                    background:"transparent",color:C.textMid,fontSize:14,cursor:"pointer"}}>
                  Cancel
                </button>
              </>
            )}

            {mode==="hours"&&(
              <>
                <div style={{color:C.text,fontSize:16,fontWeight:700,marginBottom:4}}>
                  Remove Hours
                </div>
                <div style={{color:C.textMid,fontSize:13,marginBottom:20}}>
                  {"Logged: "+currentHours+"h — how many hours to remove?"}
                </div>

                {/* Inset input */}
                <div style={{background:S2,borderRadius:18,padding:"18px 16px",marginBottom:8,
                  boxShadow:nI(C.blue),display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <input type="number" min="0.5" max={currentHours} step="0.5"
                    inputMode="decimal" pattern="[0-9]*"
                    autoFocus
                    value={newHours}
                    onChange={function(e){setNewHours(e.target.value);}}
                    placeholder="0"
                    style={{background:"transparent",border:"none",outline:"none",
                      fontSize:44,fontWeight:900,textAlign:"center",color:C.blue,
                      width:"100%",fontFamily:"'Orbitron',monospace"}}/>
                </div>

                {/* Live preview */}
                {newHours&&!isNaN(parseFloat(newHours))&&parseFloat(newHours)>0&&(
                  <div style={{textAlign:"center",marginBottom:20,color:C.textMid,fontSize:13}}>
                    {parseFloat(newHours)>=currentHours
                      ?"Will delete the entire entry"
                      :currentHours+" − "+newHours+" = "}
                    {parseFloat(newHours)<currentHours&&(
                      <span style={{
                        background:GR.blue,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",
                        backgroundClip:"text",fontWeight:700}}>
                        {Math.round((currentHours-parseFloat(newHours))*100)/100+"h remaining"}
                      </span>
                    )}
                  </div>
                )}

                <button onClick={handleDeleteHours}
                  style={{width:"100%",padding:"16px",borderRadius:18,border:"none",cursor:"pointer",
                    background:GR.blue,color:"#fff",fontSize:14,fontWeight:700,letterSpacing:1,
                    fontFamily:"'Orbitron',monospace",textTransform:"uppercase",
                    boxShadow:nR(C.blue,.9),marginBottom:12}}>
                  Confirm
                </button>
                <button onClick={function(){setMode(null);setNewHours("");}}
                  style={{width:"100%",padding:"12px",borderRadius:14,border:"none",
                    background:"transparent",color:C.textMid,fontSize:14,cursor:"pointer"}}>
                  ← Back
                </button>
              </>
            )}
          </div>
        </div>
      )}
    </>
  );
}

// ── Monthly Summary ───────────────────────────────────────────────
function MonthlySummary(p){
  var emp=p.emp, data=p.data, setData=p.setData;
  var now=new Date();
  var [viewYear,setViewYear]=useState(now.getFullYear());
  var [viewMonth,setViewMonth]=useState(now.getMonth()); // 0-indexed

  var MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  function getDaysInMonth(y,m){
    var a=[];
    var d=new Date(y,m,1);
    while(d.getMonth()===m){
      a.push(d.toISOString().split("T")[0]);
      d.setDate(d.getDate()+1);
    }
    return a;
  }

  var days=getDaysInMonth(viewYear,viewMonth);
  var empData=(data&&data[emp.id])||{};
  var entries=days.map(function(d){return empData[d];}).filter(Boolean);
  var totalH=entries.reduce(function(s,e){return s+(e.type==="project"?0:(e.hours||0));},0);
  var totalP=entries.reduce(function(s,e){return s+(e.type==="project"?(e.projectAmt||0):0);},0);
  var totalPay=Math.round(totalH*(emp.rate||0)+totalP);
  var daysWorked=entries.length;

  function prevMonth(){
    if(viewMonth===0){setViewMonth(11);setViewYear(function(y){return y-1;});}
    else setViewMonth(function(m){return m-1;});
  }
  function nextMonth(){
    var isCurrentMonth=viewYear===now.getFullYear()&&viewMonth===now.getMonth();
    if(isCurrentMonth) return;
    if(viewMonth===11){setViewMonth(0);setViewYear(function(y){return y+1;});}
    else setViewMonth(function(m){return m+1;});
  }
  var isCurrentMonth=viewYear===now.getFullYear()&&viewMonth===now.getMonth();

  return(
    <div style={{padding:"24px 18px"}} className="slide">
      {/* Month navigator */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:22}}>
        <button className="ghost" onClick={prevMonth}
          style={{width:40,height:40,borderRadius:12,fontSize:18,color:C.blue,fontWeight:700,padding:0}}>‹</button>
        <div className="tf" style={{background:empGrad(emp),WebkitBackgroundClip:"text",
          WebkitTextFillColor:"transparent",backgroundClip:"text",fontSize:16,fontWeight:700,textAlign:"center"}}>
          {MONTHS[viewMonth]+" "+viewYear}
        </div>
        <button className="ghost" onClick={nextMonth}
          style={{width:40,height:40,borderRadius:12,fontSize:18,
            color:isCurrentMonth?C.textDim:C.blue,fontWeight:700,padding:0,
            opacity:isCurrentMonth?.3:1,cursor:isCurrentMonth?"default":"pointer"}}>›</button>
      </div>

      {/* Summary stats */}
      <div className="tile" style={{padding:"20px",marginBottom:20,boxShadow:nR(emp.color,.6)}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:3,
          borderRadius:"20px 20px 0 0",background:empGrad(emp)}}/>
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1,textAlign:"center"}}>
            <div className="tf" style={{background:empGrad(emp),WebkitBackgroundClip:"text",
              WebkitTextFillColor:"transparent",backgroundClip:"text",fontSize:28,fontWeight:900,lineHeight:1}}>
              {totalH}
            </div>
            <div style={{color:C.textDim,fontSize:11,marginTop:6,letterSpacing:1}}>HOURS</div>
          </div>
          <div style={{width:1,background:C.textDim+"20"}}/>
          <div style={{flex:1,textAlign:"center"}}>
            <div className="tf" style={{background:GR.green,WebkitBackgroundClip:"text",
              WebkitTextFillColor:"transparent",backgroundClip:"text",fontSize:28,fontWeight:900,lineHeight:1}}>
              {daysWorked}
            </div>
            <div style={{color:C.textDim,fontSize:11,marginTop:6,letterSpacing:1}}>DAYS</div>
          </div>
          {totalPay>0&&<>
            <div style={{width:1,background:C.textDim+"20"}}/>
            <div style={{flex:1,textAlign:"center"}}>
              <div className="tf" style={{background:GR.amber,WebkitBackgroundClip:"text",
                WebkitTextFillColor:"transparent",backgroundClip:"text",fontSize:22,fontWeight:900,lineHeight:1}}>
                {"₪"+totalPay.toLocaleString("he-IL")}
              </div>
              <div style={{color:C.textDim,fontSize:11,marginTop:6,letterSpacing:1}}>EARNINGS</div>
            </div>
          </>}
        </div>
      </div>

      {/* Daily breakdown */}
      <Label text="// Daily Breakdown"/>
      <div className="tile" style={{padding:"4px 8px"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:3,
          borderRadius:"20px 20px 0 0",background:empGrad(emp)}}/>
        {days.filter(function(d){return empData[d];}).reverse().map(function(d,i,arr){
          var entry=empData[d];
          var isProj=entry.type==="project";
          var dayPay=!isProj&&emp.rate>0?(entry.hours*emp.rate):null;
          return(
            <div key={d} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"11px 10px",borderBottom:i<arr.length-1?"1px solid "+C.textDim+"15":"none"}}>
              <div style={{flex:1}}>
                <div style={{color:C.text,fontSize:13,fontWeight:600}}>{formatDate(d)}</div>
                {entry.note&&<div style={{color:C.textDim,fontSize:11,marginTop:1}}>{entry.note}</div>}
                {dayPay&&<div style={{background:GR.green,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",
                  backgroundClip:"text",fontSize:11,fontWeight:600,marginTop:1}}>{"₪"+dayPay.toLocaleString("he-IL")}</div>}
                {isProj&&<div style={{background:GR.gold,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",
                  backgroundClip:"text",fontSize:11,fontWeight:600,marginTop:1}}>{"₪"+entry.projectAmt.toLocaleString("he-IL")}</div>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {setData&&<DeleteBtn
                  entry={entry}
                  onDeleteAll={function(){
                    var upd=Object.assign({},data);
                    upd[emp.id]=Object.assign({},upd[emp.id]);
                    delete upd[emp.id][d];
                    setData(upd);saveLocal(STORAGE_KEY,upd);deleteFromMonday(emp,d);
                  }}
                  onDeleteHours={function(remaining){
                    var upd=Object.assign({},data);
                    upd[emp.id]=Object.assign({},upd[emp.id]);
                    upd[emp.id][d]=Object.assign({},upd[emp.id][d],{hours:remaining});
                    setData(upd);saveLocal(STORAGE_KEY,upd);
                  }}
                />}
                {isProj?<ProjectBadge/>:<HourBadge hours={entry.hours}/>}
              </div>
            </div>
          );
        })}
        {days.filter(function(d){return empData[d];}).length===0&&(
          <div style={{padding:"20px",textAlign:"center",color:C.textDim,fontSize:13}}>
            No entries for {MONTHS[viewMonth]}
          </div>
        )}
      </div>
    </div>
  );
}

function EmployeePinGate(p){
  var emp=p.emp, onAuth=p.onAuth, onBack=p.onBack;
  var [pin,setPin]=useState(""),[shake,setShake]=useState(false);

  // If no PIN set, skip gate
  useEffect(function(){if(!emp.pin) onAuth();}, []);
  if(!emp.pin) return null;

  function attempt(np){
    if(np===emp.pin) onAuth();
    else{setPin("");setShake(true);setTimeout(function(){setShake(false);},500);}
  }
  var keys=[1,2,3,4,5,6,7,8,9,"",0,"⌫"];
  return(
    <div style={{padding:"40px 28px",textAlign:"center"}} className="slide">
      <button className="ghost" onClick={onBack}
        style={{padding:"9px 18px",marginBottom:28,fontSize:13,fontWeight:600,
          borderRadius:14,color:C.blue,display:"block",margin:"0 auto 28px 0"}}>
        ‹  Back
      </button>
      {/* Avatar */}
      <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
        <Avatar emp={emp} size={64}/>
      </div>
      <div className="tf" style={{background:empGrad(emp),WebkitBackgroundClip:"text",
        WebkitTextFillColor:"transparent",backgroundClip:"text",
        fontSize:20,fontWeight:700,marginBottom:4}}>{emp.name}</div>
      <div style={{color:C.textDim,fontSize:11,letterSpacing:3,marginBottom:32,textTransform:"uppercase"}}>Enter PIN</div>

      {/* PIN dots */}
      <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:32}}>
        {[0,1,2,3].map(function(i){
          var filled=pin.length>i;
          return(
            <div key={i} className="pindot"
              style={{width:52,height:60,borderRadius:16,
                boxShadow:filled?nI(emp.color):nR(),
                border:filled?"1px solid "+emp.color+"44":"none",
                transition:"all .2s"}}>
              {filled&&<div style={{width:13,height:13,borderRadius:"50%",
                background:empGrad(emp),boxShadow:nG(emp.color,7)}}/>}
            </div>
          );
        })}
      </div>

      {/* Numpad */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,
        maxWidth:260,margin:"0 auto",
        transform:shake?"translateX(-8px)":"none",transition:"transform .06s"}}>
        {keys.map(function(k,i){
          if(k==="") return <div key={i}/>;
          return(
            <button key={i} className="nkey" onClick={function(){
              if(k==="⌫") setPin(function(pr){return pr.slice(0,-1);});
              else if(pin.length<4){var np=pin+k;setPin(np);if(np.length===4)setTimeout(function(){attempt(np);},150);}
            }}>{k}</button>
          );
        })}
      </div>
    </div>
  );
}

// SALES FORM (Itamar-style commission employees)
// ══════════════════════════════════════════════════════════════════
function SalesForm(p){
  var emp=p.emp, data=p.data, setData=p.setData, onBack=p.onBack;
  var today=getTodayStr();
  var [selDate,setSelDate]=useState(today);
  var [saleAmt,setSaleAmt]=useState("");
  var [note,setNote]=useState("");
  var [saved,setSaved]=useState(false);

  var commission=parseFloat(emp.commission)||0;

  useEffect(function(){
    var e=data&&data[emp.id]&&data[emp.id][selDate];
    if(e){setSaleAmt(e.saleAmt||"");setNote(e.note||"");}
    else{setSaleAmt("");setNote("");}
  },[selDate]);

  var existing=data&&data[emp.id]&&data[emp.id][selDate];
  var saleN=parseFloat(saleAmt);
  var commissionEarned=!isNaN(saleN)&&saleN>0?(saleN*commission/100):null;

  // Monthly totals
  var now=new Date();
  var MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var monthDays=(function(){var a=[],d=new Date(now.getFullYear(),now.getMonth(),1);while(d.getMonth()===now.getMonth()){a.push(d.toISOString().split("T")[0]);d.setDate(d.getDate()+1);}return a;})();
  var empData=(data&&data[emp.id])||{};
  var monthSales=monthDays.reduce(function(s,d){var e=empData[d];return s+(e&&e.type==="sales"?(e.saleAmt||0):0);},0);
  var monthCommission=Math.round(monthSales*commission/100);

  function save(){
    if(isNaN(saleN)||saleN<0) return;
    var upd=Object.assign({},data);
    if(!upd[emp.id]) upd[emp.id]={};
    var entry={type:"sales",saleAmt:saleN,commission:commission,earned:Math.round(saleN*commission/100),note:note,ts:new Date().toISOString()};
    upd[emp.id][selDate]=entry;
    setData(upd);saveLocal(STORAGE_KEY,upd);
    setSaved(true);setTimeout(function(){setSaved(false);},2500);
    syncToMonday(emp,selDate,entry);
  }

  return(
    <div style={{padding:"24px 18px"}} className="slide">

      {/* Back button */}
      <button className="ghost" onClick={p.onBack}
        style={{padding:"9px 18px",marginBottom:18,fontSize:13,fontWeight:600,
          borderRadius:14,color:C.blue,display:"inline-flex",alignItems:"center",gap:6}}>
        ‹  Back
      </button>

      {/* Live commission + monthly card */}
      <div className="tile" style={{padding:"0",marginBottom:20,overflow:"hidden",
        boxShadow:nR(emp.color,.6)}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:3,
          borderRadius:"20px 20px 0 0",background:empGrad(emp)}}/>

        {/* Live: this entry */}
        <div style={{padding:"16px 18px 12px",borderBottom:"1px solid "+C.textDim+"18"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{color:C.textMid,fontSize:11,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>
                {saleAmt&&!isNaN(saleN)&&saleN>0?"This sale":"Commission rate"}
              </div>
              <div style={{color:C.textDim,fontSize:12}}>
                {saleAmt&&!isNaN(saleN)&&saleN>0
                  ?"₪"+saleN.toLocaleString("he-IL")+" × "+commission+"%"
                  :commission+"% commission"}
              </div>
            </div>
            <div className="tf" style={{
              background:commissionEarned?empGrad(emp):"none",
              WebkitBackgroundClip:commissionEarned?"text":"unset",
              WebkitTextFillColor:commissionEarned?"transparent":"unset",
              backgroundClip:commissionEarned?"text":"unset",
              color:commissionEarned?undefined:C.textDim,
              fontSize:commissionEarned?28:18,fontWeight:900,transition:"font-size .15s",
            }}>
              {commissionEarned?"₪"+Math.round(commissionEarned).toLocaleString("he-IL"):"₪—"}
            </div>
          </div>
        </div>

        {/* Monthly */}
        <button onClick={function(){p.onOpenSummary&&p.onOpenSummary();}}
          style={{padding:"12px 18px 16px",display:"block",width:"100%",
            background:"transparent",border:"none",cursor:"pointer",textAlign:"right"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{color:C.textMid,fontSize:11,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>
                {MONTHS[now.getMonth()]+" sales  ›"}
              </div>
              <div style={{color:C.textDim,fontSize:12}}>{"₪"+monthSales.toLocaleString("he-IL")+" total sales"}</div>
            </div>
            <div className="tf" style={{
              background:GR.sales,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",
              backgroundClip:"text",fontSize:22,fontWeight:900}}>
              {"₪"+monthCommission.toLocaleString("he-IL")}
            </div>
          </div>
          {monthSales>0&&(
            <div style={{color:C.textDim,fontSize:10,marginTop:8,textAlign:"right"}}>
              Tap for monthly breakdown
            </div>
          )}
        </button>
      </div>

      {/* Profile */}
      <div className="tile" style={{padding:"14px 18px",marginBottom:20,
        boxShadow:nR(emp.color,.4),overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:3,
          borderRadius:"20px 20px 0 0",background:empGrad(emp)}}/>
        <div style={{display:"flex",alignItems:"center",gap:14,direction:"ltr"}}>
          <Avatar emp={emp} size={48}/>
          <div>
            <div className="tf" style={{background:empGrad(emp),WebkitBackgroundClip:"text",
              WebkitTextFillColor:"transparent",backgroundClip:"text",fontSize:16,fontWeight:700}}>
              {emp.name}
            </div>
            <div style={{color:C.textMid,fontSize:12,marginTop:2}}>Sales · {commission}% commission</div>
          </div>
        </div>
      </div>

      {/* Date */}
      <DateRow date={selDate} setDate={setSelDate}/>

      {existing&&(
        <div style={{background:S2,borderRadius:14,padding:"10px 16px",marginBottom:16,
          boxShadow:nI(C.sales)}}>
          <span style={{background:GR.sales,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",
            backgroundClip:"text",fontSize:13,fontWeight:600}}>
            {"▸  ₪"+existing.saleAmt.toLocaleString("he-IL")+" sale logged — tap Save to update"}
          </span>
        </div>
      )}

      {/* Sale amount */}
      <Label text="// Sale Amount (₪)"/>
      <div style={{background:S2,borderRadius:20,padding:"20px 16px",marginBottom:
        commissionEarned?10:16,
        boxShadow:nI(emp.color),display:"flex",alignItems:"center",justifyContent:"center"}}>
        <input type="number" min="0" step="100" inputMode="decimal" pattern="[0-9]*"
          value={saleAmt} onChange={function(e){setSaleAmt(e.target.value);}}
          placeholder="0"
          style={{background:"transparent",border:"none",outline:"none",
            fontSize:44,fontWeight:900,textAlign:"center",color:emp.color,
            width:"100%",letterSpacing:2,fontFamily:"'Orbitron',monospace"}}/>
      </div>

      {commissionEarned&&(
        <div style={{textAlign:"center",marginBottom:16}}>
          <span style={{color:C.textDim,fontSize:12}}>{commission+"% = "}</span>
          <span className="tf" style={{background:empGrad(emp),WebkitBackgroundClip:"text",
            WebkitTextFillColor:"transparent",backgroundClip:"text",fontSize:20,fontWeight:800}}>
            {"₪"+Math.round(commissionEarned).toLocaleString("he-IL")+" commission"}
          </span>
        </div>
      )}

      {/* Notes */}
      <Label text="// Notes"/>
      <textarea value={note} onChange={function(e){setNote(e.target.value);}}
        placeholder="Client name, deal details..." rows={3}
        className="well"
        style={{padding:"14px 16px",fontSize:15,marginBottom:22,resize:"none",
          lineHeight:1.6,borderRadius:16}}/>

      <div className="cta" onClick={save}
        style={{padding:"18px",fontSize:15,letterSpacing:2,textTransform:"uppercase",
          textAlign:"center",cursor:"pointer",borderRadius:20,
          background:saved?GR.green:empGrad(emp),
          boxShadow:saved?nR(C.green,1):nR(emp.color,1),
          color:"#fff",fontFamily:"'Orbitron',monospace",fontWeight:900}}>
        {saved?"✓   Saved":"Log Sale"}
      </div>

      {/* History */}
      <div style={{marginTop:32}}>
        <Label text="// Last 14 Days"/>
        <div className="tile" style={{padding:"4px 8px"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:3,
            borderRadius:"20px 20px 0 0",background:empGrad(emp)}}/>
          {getDaysInRange(14).reverse().map(function(d,i,arr){
            var entry=data&&data[emp.id]&&data[emp.id][d];
            var isSales=entry&&entry.type==="sales";
            var isSelected=d===selDate;
            return(
              <div key={d} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                padding:"10px 10px",
                borderBottom:i<arr.length-1?"1px solid "+C.textDim+"15":"none",
                background:isSelected?S2:"transparent",
                borderRadius:isSelected?"12px":"0",
                boxShadow:isSelected?nI(emp.color):"none",
                margin:isSelected?"2px 0":"0"}}>
                <div style={{flex:1}}>
                  <span style={{color:d===today?C.sales:C.textMid,fontSize:13,
                    fontWeight:d===today?700:500}}>
                    {d===today?"Today  ":""}{formatDateShort(d)}
                  </span>
                  {entry&&entry.note&&<div style={{color:C.textDim,fontSize:11,marginTop:2}}>{entry.note}</div>}
                  {isSales&&<div style={{background:GR.sales,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",
                    backgroundClip:"text",fontSize:11,fontWeight:600,marginTop:2}}>
                    {"₪"+entry.saleAmt.toLocaleString("he-IL")+" sale → ₪"+entry.earned.toLocaleString("he-IL")+" commission"}
                  </div>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {entry&&<DeleteBtn
                    entry={entry}
                    onDeleteAll={function(){
                      var upd=Object.assign({},data);
                      upd[emp.id]=Object.assign({},upd[emp.id]);
                      delete upd[emp.id][d];
                      setData(upd);saveLocal(STORAGE_KEY,upd);deleteFromMonday(emp,d);
                    }}
                    onDeleteHours={null}
                  />}
                  {isSales?<SalesBadge/>:<span style={{color:C.textDim,fontSize:13}}>—</span>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function EmployeeView(p){

// SETTINGS
// ══════════════════════════════════════════════════════════════════
function SettingsView(p){
  var [editing,setEditing]=useState(null);
  var [form,setForm]=useState({name:"",rate:"",commission:"10",pin:"",color:EMP_COLORS[0],grad:EMP_GRADS[0],empType:"regular"});
  var [confirmDel,setConfirmDel]=useState(null);
  var employees=p.employees,setEmployees=p.setEmployees;

  function openNew(){var used=employees.map(function(e){return e.color;});var idx=EMP_COLORS.findIndex(function(c){return !used.includes(c);});if(idx<0)idx=employees.length%EMP_COLORS.length;setForm({name:"",rate:"",commission:"10",pin:"",color:EMP_COLORS[idx],grad:EMP_GRADS[idx],empType:"regular"});setEditing("new");}
  function openEdit(e){setForm({name:e.name,rate:e.rate||"",commission:e.commission||"10",pin:e.pin||"",color:e.color,grad:e.grad||GR.blue,empType:e.empType||"regular"});setEditing(e.id);}
  function save(){
    if(!form.name.trim())return;
    var rate=parseFloat(form.rate)||0;
    var commission=parseFloat(form.commission)||0;
    var base={name:form.name.trim(),color:form.color,grad:form.grad,pin:form.pin,empType:form.empType};
    var extra=form.empType==="sales"?{commission:commission,rate:0}:{rate:rate};
    var full=Object.assign(base,extra);
    var upd;
    if(editing==="new") upd=employees.concat([Object.assign({id:Date.now().toString()},full)]);
    else upd=employees.map(function(e){return e.id===editing?Object.assign({},e,full):e;});
    setEmployees(upd);saveLocal(EMP_KEY,upd);setEditing(null);
  }
  function del(id){var upd=employees.filter(function(e){return e.id!==id;});setEmployees(upd);saveLocal(EMP_KEY,upd);setConfirmDel(null);}

  if(editing!==null){
    var isNew=editing==="new";
    var isSalesForm=form.empType==="sales";
    var prev={name:form.name||"?",color:form.color,grad:form.grad};
    return(
      <div style={{padding:"24px 18px"}} className="slide">
        <button className="ghost" onClick={function(){setEditing(null);}}
          style={{padding:"9px 18px",marginBottom:22,fontSize:13,fontWeight:600,borderRadius:14,color:C.blue}}>‹  Back</button>
        <Label text={isNew?"// New Employee":"// Edit Employee"}/>

        <div className="tile" style={{padding:"18px",marginBottom:22,boxShadow:nR(form.color,.55)}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:3,borderRadius:"20px 20px 0 0",background:form.grad}}/>

// MANAGER DETAIL
// ══════════════════════════════════════════════════════════════════
function ManagerDetail(p){
  var emp=p.emp,data=p.data,setData=p.setData,days=getDaysInRange(p.range);
  var isSales=emp.empType==="sales";
  var empData=(data&&data[emp.id])||{};
  var empDays=days.filter(function(d){return empData[d];});
  var totalH=empDays.reduce(function(s,d){var e=empData[d];return s+(e.type==="project"?0:e.type==="sales"?0:(e.hours||0));},0);
  var totalP=empDays.reduce(function(s,d){var e=empData[d];return s+(e.type==="project"?(e.projectAmt||0):0);},0);
  var totalSales=empDays.reduce(function(s,d){var e=empData[d];return s+(e.type==="sales"?(e.saleAmt||0):0);},0);
  var totalCommission=empDays.reduce(function(s,d){var e=empData[d];return s+(e.type==="sales"?(e.earned||0):0);},0);
  var totalPay=isSales?Math.round(totalCommission):Math.round(totalH*(parseFloat(emp.rate)||0)+totalP);
  var avg=empDays.length?(isSales?(totalSales/empDays.length).toFixed(0):(totalH/Math.max(empDays.filter(function(d){return empData[d].type!=="project";}).length,1)).toFixed(1)):0;
  var today=getTodayStr();
  return(
    <div style={{padding:"24px 18px"}} className="slide">
      <button className="ghost" onClick={p.onBack}
        style={{padding:"9px 18px",marginBottom:22,fontSize:13,fontWeight:600,borderRadius:14,color:C.blue}}>‹  Back</button>

      <div className="tile" style={{padding:"20px",marginBottom:18,boxShadow:nR(emp.color,.7)}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:4,borderRadius:"20px 20px 0 0",background:empGrad(emp)}}/>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16,direction:"ltr"}}>
          <Avatar emp={emp} size={54}/>
          <div>
            <div className="tf" style={{background:empGrad(emp),WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",fontSize:18,fontWeight:700}}>{emp.name}</div>
            {isSales
              ?<div style={{color:C.textMid,fontSize:12,marginTop:2}}>{(emp.commission||10)+"% commission"}</div>
              :(parseFloat(emp.rate)>0&&<div style={{color:C.textMid,fontSize:12,marginTop:2}}>{"₪"+emp.rate+" / hr"}</div>)
            }
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          {isSales?(
            <>
              <StatBox value={"₪"+totalSales.toLocaleString("he-IL")} label="Total Sales" grad={empGrad(emp)}/>
              <StatBox value={empDays.length} label="Days" grad={GR.blue}/>
              <StatBox value={"₪"+avg} label="Avg Sale" grad={GR.purple}/>
              {totalCommission>0&&<StatBox value={"₪"+totalCommission.toLocaleString("he-IL")} label="Commission" grad={GR.sales}/>}
            </>
          ):(
            <>
              <StatBox value={totalH} label="Hours" grad={empGrad(emp)}/>
              <StatBox value={empDays.length} label="Days" grad={GR.blue}/>
              <StatBox value={avg} label="Avg/Day" grad={GR.purple}/>
              {totalPay>0&&<StatBox value={"₪"+totalPay.toLocaleString("he-IL")} label="Pay" grad={GR.green}/>}
            </>
          )}
        </div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {days.slice().reverse().map(function(d){
          var entry=empData[d];
          var isProj=entry&&entry.type==="project";
          var isSaleEntry=entry&&entry.type==="sales";
          var dayPay=entry&&!isProj&&!isSaleEntry&&parseFloat(emp.rate)>0?"₪"+(entry.hours*parseFloat(emp.rate)).toLocaleString("he-IL"):null;
          return(
            <div key={d} className="hcard" style={{boxShadow:entry?nR(emp.color,.35):nR()}}>
              {entry&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,borderRadius:"20px 20px 0 0",background:empGrad(emp)}}/>}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",position:"relative"}}>
                <div style={{flex:1}}>
                  <div style={{color:d===today?C.blue:C.text,fontSize:14,fontWeight:600}}>{formatDate(d)}</div>
                  {entry&&entry.note&&<div style={{color:C.textDim,fontSize:12,marginTop:2}}>{entry.note}</div>}
                  {dayPay&&<div style={{background:GR.green,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",fontSize:12,fontWeight:600,marginTop:2}}>{dayPay}</div>}
                  {isProj&&<div style={{background:GR.gold,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",fontSize:12,fontWeight:600,marginTop:2}}>{"₪"+entry.projectAmt.toLocaleString("he-IL")+" (project)"}</div>}
                  {isSaleEntry&&<div style={{background:GR.sales,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",fontSize:12,fontWeight:600,marginTop:2}}>{"₪"+entry.saleAmt.toLocaleString("he-IL")+" sale → ₪"+entry.earned.toLocaleString("he-IL")+" commission"}</div>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {entry&&setData&&<DeleteBtn
                    entry={entry}
                    onDeleteAll={function(){
                      var upd=Object.assign({},data);
                      upd[emp.id]=Object.assign({},upd[emp.id]);
                      delete upd[emp.id][d];
                      setData(upd);saveLocal(STORAGE_KEY,upd);deleteFromMonday(emp,d);
                    }}
                    onDeleteHours={!isSaleEntry&&!isProj?function(remaining){
                      var upd=Object.assign({},data);
                      upd[emp.id]=Object.assign({},upd[emp.id]);
                      upd[emp.id][d]=Object.assign({},upd[emp.id][d],{hours:remaining});
                      setData(upd);saveLocal(STORAGE_KEY,upd);
                    }:null}
                  />}
                  {isSaleEntry?<SalesBadge/>:isProj?<ProjectBadge/>:<HourBadge hours={entry?entry.hours:0}/>}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// MANAGER DASHBOARD
// ══════════════════════════════════════════════════════════════════
function ManagerDashboard(p){
  var employees=p.employees,data=p.data,setData=p.setData;
  var [sel,setSel]=useState(null);
  var [range,setRange]=useState(14);
  var today=getTodayStr(),days=getDaysInRange(range);
  var emp=employees.find(function(e){return e.id===sel;});
  if(emp) return <ManagerDetail emp={emp} data={data} setData={setData} range={range} onBack={function(){setSel(null);}}/>;

  var wd=getDaysInRange(7);
  var todayH=employees.reduce(function(s,e){var en=data&&data[e.id]&&data[e.id][today];return s+(en&&en.type!=="project"?(en.hours||0):0);},0);
  var weekH=employees.reduce(function(s,e){return s+wd.reduce(function(ws,d){var en=data&&data[e.id]&&data[e.id][d];return ws+(en&&en.type!=="project"?(en.hours||0):0);},0);},0);
  var checkedIn=employees.filter(function(e){return data&&data[e.id]&&data[e.id][today];}).length;
  var weekPay=employees.reduce(function(s,e){return s+wd.reduce(function(ws,d){var en=data&&data[e.id]&&data[e.id][d];if(!en)return ws;if(en.type==="project")return ws+(en.projectAmt||0);return ws+(en.hours||0)*(e.rate||0);},0);},0);

  return(
    <div style={{padding:"24px 18px"}} className="slide">
      <Label text="// Dashboard"/>
      <div style={{display:"flex",gap:10,marginBottom:22,flexWrap:"wrap"}}>
        <StatBox value={todayH} label="Today hrs" grad={GR.purple}/>
        <StatBox value={checkedIn+"/"+employees.length} label="Logged" grad={GR.green}/>
        <StatBox value={weekH} label="Week hrs" grad={GR.blue}/>
        {weekPay>0&&<StatBox value={"₪"+Math.round(weekPay).toLocaleString("he-IL")} label="Week pay" grad={GR.amber}/>}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:22}}>
        {[7,14,30].map(function(r){
          return <button key={r} className={"rpill"+(range===r?" on":"")} onClick={function(){setRange(r);}}>{r+" d"}</button>;
        })}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {employees.map(function(emp){
          var empData=(data&&data[emp.id])||{};
          var empDays=days.filter(function(d){return empData[d];});
          var totalH=empDays.reduce(function(s,d){return s+(empData[d].type==="project"?0:(empData[d].hours||0));},0);
          var totalP=empDays.reduce(function(s,d){return s+(empData[d].type==="project"?(empData[d].projectAmt||0):0);},0);
          var totalPay=Math.round(totalH*(emp.rate||0)+totalP);
          var hasToday=!!(empData[today]);
          var te=empData[today];
          return(
            <button key={emp.id} className="ecard" onClick={function(){setSel(emp.id);}}
              style={{padding:"16px 18px",boxShadow:nR(emp.color,.45)}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:3,borderRadius:"24px 24px 0 0",background:empGrad(emp)}}/>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12,direction:"ltr"}}>
                <Avatar emp={emp} size={44} online={hasToday}/>
                <div style={{flex:1,textAlign:"left"}}>
                  <div style={{fontWeight:700,fontSize:17,color:C.text}}>{emp.name}</div>
                  <div style={{fontSize:11,marginTop:2,color:hasToday?C.green:C.textMid}}>
                    {hasToday?(te.type==="sales"?"✓  ₪"+te.saleAmt.toLocaleString("he-IL")+" sale":te.type==="project"?"✓  Project logged":"✓  "+te.hours+"h today"):"Not logged yet"}
                  </div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div className="tf" style={{background:empGrad(emp),WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",fontSize:22,fontWeight:900}}>{totalH}</div>
                  <div style={{color:C.textDim,fontSize:10}}>hrs</div>
                  {totalPay>0&&<div style={{background:GR.green,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",fontSize:11,fontWeight:600,marginTop:1}}>{"₪"+totalPay.toLocaleString("he-IL")}</div>}
                </div>
              </div>
              {/* Sparkline — inset container like reference */}
              <div className="spark">
                <div style={{display:"flex",gap:4,alignItems:"flex-end",height:24}}>
                  {getDaysInRange(7).map(function(d){
                    var en=empData[d];
                    var isProj=en&&en.type==="project";
                    var h=en&&!isProj?(en.hours||0):0;
                    var pct=Math.min(h/10,1);
                    var grad=!en?null:isProj?GR.gold:h>=8?GR.green:h>=4?GR.amber:GR.blue;
                    var col=!en?C.textDim:isProj?C.gold:h>=8?C.green:h>=4?C.amber:C.blue;
                    return(
                      <div key={d} style={{flex:1,height:Math.max(isProj?24:3,pct*24),borderRadius:5,
                        background:grad||S1,
                        boxShadow:en?"0 0 5px "+col+"60":null,
                        transition:"height .3s ease"}}>
                      </div>
                    );
                  })}
                </div>
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// MAIN APP
// ══════════════════════════════════════════════════════════════════
function loadEmployees(){
  // Try current key first
  var curr=loadLocal(EMP_KEY,null);
  if(curr&&curr.length) return curr;
  // Migrate from older keys — preserve rate/pin if set
  var old=loadLocal("timelog_employees_v5",null)||loadLocal("timelog_employees_v4",null)||loadLocal("timelog_employees_v3",null);
  if(old&&old.length){
    var migrated=DEFAULT_EMPLOYEES.map(function(def){
      var prev=old.find(function(e){return e.id===def.id;});
      return prev?Object.assign({},def,{name:prev.name,color:prev.color||def.color,grad:prev.grad||def.grad,rate:prev.rate||0,pin:prev.pin||"",empType:prev.empType||def.empType||"regular",commission:prev.commission||def.commission||0}):def;
    });
    saveLocal(EMP_KEY,migrated);
    return migrated;
  }
  return DEFAULT_EMPLOYEES;
}

export default function App(){
  var [tab,setTab]=useState("employee");
  var [data,setData]=useState(function(){return loadLocal(STORAGE_KEY,{});});
  var [employees,setEmployees]=useState(loadEmployees);
  var [syncStatus,setSyncStatus]=useState("idle"); // idle | syncing | ok | error

  // Wrap setData to auto-sync — already handled per save
  // Test Monday connection on mount
  useEffect(function(){
    setSyncStatus("syncing");
    var attempts = 0;
    function tryConnect() {
      testMondayConnection().then(function(ok){
        if (ok) {
          setSyncStatus("ok");
        } else if (attempts < 2) {
          attempts++;
          setTimeout(tryConnect, 2000);
        } else {
          setSyncStatus("error");
        }
      });
    }
    tryConnect();
  },[]);

  return(
    <>
      <StyleInjector/>
      <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:BG,color:C.text,fontFamily:"'Inter',sans-serif"}}>

        {/* Header */}
        <div style={{background:BG,padding:"18px 20px 0",position:"sticky",top:0,zIndex:10,
          boxShadow:"0 2px 20px "+SHD}}>
          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
            {/* Logo — raised tile like reference */}
            <div className="tile" style={{width:44,height:44,borderRadius:16,flexShrink:0,
              background:GR.blue,display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:20,boxShadow:nR(C.blue,.9)}}>⏱</div>
            <div>
              <div className="tf" style={{background:GR.blue,WebkitBackgroundClip:"text",
                WebkitTextFillColor:"transparent",backgroundClip:"text",
                fontSize:16,fontWeight:900,letterSpacing:3,animation:"flicker 9s infinite"}}>
                TIMELOG
              </div>
              <div style={{color:C.textDim,fontSize:10,letterSpacing:2,marginTop:1}}>{formatDate(getTodayStr())}</div>
            </div>
            <div style={{flex:1}}/>
            {/* Monday sync status */}
            <div style={{display:"flex",alignItems:"center",gap:7,
              background:S2,borderRadius:20,padding:"6px 12px",
              boxShadow:nI(syncStatus==="ok"?C.green:syncStatus==="error"?C.amber:C.textDim)}}>
              <div style={{width:7,height:7,borderRadius:"50%",
                background:syncStatus==="ok"?GR.green:syncStatus==="syncing"?GR.amber:syncStatus==="error"?"#ff6b6b":C.textDim,
                animation:syncStatus==="syncing"?"pulse 1s ease-in-out infinite":"none",
                boxShadow:syncStatus==="ok"?nG(C.green,4):syncStatus==="error"?nG("#ff6b6b",4):"none"}}/>
              <span style={{
                color:syncStatus==="ok"?C.green:syncStatus==="syncing"?C.amber:syncStatus==="error"?"#ff6b6b":C.textDim,
                fontSize:10,letterSpacing:1,fontWeight:700}}>
                {syncStatus==="ok"?"MONDAY ✓":syncStatus==="syncing"?"CONNECTING...":syncStatus==="error"?"OFFLINE":"MONDAY"}
              </span>
            </div>
          </div>
          {/* Main tabs */}
          <div style={{display:"flex",gap:10,paddingBottom:16}}>
            <button className={"pill"+(tab==="employee"?" on":"")}
              onClick={function(){setTab("employee");}}
              style={{padding:"9px 22px",fontSize:13}}>Log Hours</button>
            <button className={"pill"+(tab==="manager"?" on":"")}
              onClick={function(){setTab("manager");}}
              style={{padding:"9px 22px",fontSize:13}}>Manager</button>
          </div>
        </div>

        {tab==="employee"
          ?<EmployeeView employees={employees} data={data} setData={setData}/>
          :<ManagerView employees={employees} setEmployees={setEmployees} data={data} setData={setData}/>
        }
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
